name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    # macOS on Apple Silicon: currently the only platform where the upstream
    # @contentauth/c2pa-node binary loads. Tracked for a cross-platform c2patool
    # fallback — see ROADMAP.md.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
