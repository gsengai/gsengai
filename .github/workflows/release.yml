name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC trusted publishing (tokenless) + automatic provenance

jobs:
  publish:
    # macOS on Apple Silicon: currently the only platform where the upstream
    # @contentauth/c2pa-node binary loads (the release runs the test suite).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      # Token-based publish (NPM_TOKEN). Requires: account write-2FA off (done), and the
      # packages' publishing-access allowing tokens (do NOT set "disallow tokens"). OIDC via
      # pnpm was attempted but hit upstream tooling bugs (placeholder token, recursive not
      # doing the OIDC exchange, broken provenance module); revisit when pnpm matures.
      # The private demo app is skipped.
      - run: pnpm -r publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
