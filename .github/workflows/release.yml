name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC trusted publishing (tokenless) + automatic provenance

jobs:
  publish:
    # macOS on Apple Silicon: currently the only platform where the upstream
    # @contentauth/c2pa-node binary loads (the release runs the test suite).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      # Tokenless publish via OIDC trusted publishing — no NPM_TOKEN. Requires a trusted
      # publisher configured for each @gsengai/* package on npmjs.com (repo + this workflow).
      # Provenance is attached automatically. pnpm 10 supports OIDC; do NOT move to pnpm 11
      # (it currently breaks OIDC publishing — pnpm#11513). The private demo app is skipped.
      - run: pnpm -r publish --access public --no-git-checks --provenance
